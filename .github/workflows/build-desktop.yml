name: Build desktop apps

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  package:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-2025-vs2026
            platform: win
            arch: x64
            artifact_name: windows
          # macOS
          - os: macos-15-intel
            platform: mac
            arch: x64
            artifact_name: macos-x64
          - os: macos-15
            platform: mac
            arch: arm64
            artifact_name: macos-arm64
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: linux

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package desktop app
        run: npm run package -- --${{ matrix.platform }} --${{ matrix.arch }}

      - name: Validate macOS DMG artifacts
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(release/*.dmg)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "::warning::No macOS DMG artifacts were produced."
            exit 0
          fi

          for dmg in "${dmgs[@]}"; do
            echo "Validating ${dmg}"

            if hdiutil verify "${dmg}" && attach_output="$(hdiutil attach -readonly -nobrowse -noautoopen "${dmg}" 2>&1)"; then
              echo "${attach_output}"
              devices="$(printf '%s\n' "${attach_output}" | awk '/^\/dev\// { print $1 }')"

              while IFS= read -r device; do
                if [ -n "${device}" ]; then
                  hdiutil detach "${device}" -quiet || true
                fi
              done <<< "${devices}"

              continue
            fi

            echo "::error::DMG validation failed for ${dmg}"

            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "::warning::Removing invalid arm64 DMG from release artifacts. The macOS arm64 ZIP remains available."
              rm -f "${dmg}" "${dmg}.blockmap"
              continue
            fi

            exit 1
          done

      - name: Upload packaged app
        uses: actions/upload-artifact@v6
        with:
          name: esp-board-vault-${{ matrix.artifact_name }}
          path: |
            release/*.AppImage
            release/*.blockmap
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.tar.gz
            release/*.yml
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download packaged apps
        uses: actions/download-artifact@v7
        with:
          pattern: esp-board-vault-*
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release notes
        env:
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CHANGELOG_SECTION_FILE="$RUNNER_TEMP/release-changelog.md"
          INSTALL_NOTES_FILE="$RUNNER_TEMP/release-install-notes.md"
          RELEASE_NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          if ! awk -v target="$VERSION" '
            function trim(value) {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
              return value
            }
            /^##[[:space:]]+/ {
              heading = $0
              sub(/^##[[:space:]]+/, "", heading)
              heading = trim(heading)
              version = heading
              sub(/[[:space:]]+-.*/, "", version)
              gsub(/^\[/, "", version)
              gsub(/\]$/, "", version)
              if (capture) exit
              if (version == target || version == "v" target) {
                capture = 1
                found = 1
                next
              }
            }
            capture { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > "$CHANGELOG_SECTION_FILE"; then
            echo "::warning::No changelog section found for ${VERSION}; release notes will include install notes only."
            : > "$CHANGELOG_SECTION_FILE"
          fi

          sed \
            -e "s|{{REPOSITORY}}|$GH_REPO|g" \
            -e "s|{{TAG_NAME}}|$TAG_NAME|g" \
            -e "s|{{VERSION}}|$VERSION|g" \
            .github/release-install-notes.md > "$INSTALL_NOTES_FILE"

          {
            echo "## Changes"
            echo
            if [ -s "$CHANGELOG_SECTION_FILE" ]; then
              cat "$CHANGELOG_SECTION_FILE"
            else
              echo "_No changelog entry found for ${VERSION}._"
            fi
            echo
            cat "$INSTALL_NOTES_FILE"
          } > "$RELEASE_NOTES_FILE"

          echo "RELEASE_NOTES_FILE=$RELEASE_NOTES_FILE" >> "$GITHUB_ENV"

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --repo "$GH_REPO" --clobber
            gh release edit "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "ESP Board Vault $TAG_NAME" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG_NAME" release-artifacts/* \
              --repo "$GH_REPO" \
              --title "ESP Board Vault $TAG_NAME" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
