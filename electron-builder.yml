appId: com.thelastoutpostworkshop.espboardvault
productName: ESP Board Vault
copyright: Copyright 2026 The Last Outpost Workshop

directories:
  buildResources: build
  output: release

files:
  - dist/**
  - dist-electron/**
  - package.json

extraResources:
  - from: build/icon.png
    to: icon.png

asar: true
npmRebuild: false
afterPack: scripts/after-pack-icons.cjs
electronFuses:
  resetAdHocDarwinSignature: true
  runAsNode: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

win:
  artifactName: ${productName}-${version}-windows-${arch}.${ext}
  icon: icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  artifactName: ${productName}-${version}-macos-${arch}.${ext}
  category: public.app-category.developer-tools
  icon: icon.icns
  target:
    - target: dmg
    - target: zip

dmg:
  format: ULFO
  filesystem: APFS

linux:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  category: Development
  icon: icons/linux
  maintainer: The Last Outpost Workshop <noreply@github.com>
  syncDesktopName: true
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
